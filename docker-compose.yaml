services:
  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    ports:
      - "${REDIS_BIND:-127.0.0.1:6382}:6379"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ext-proxy:
    image: ${TEE_PROXY_IMAGE:-registry.gitlab.com/flarenetwork/tee/e2e/tee-proxy}
    volumes:
      - ./config/proxy/extension_proxy.docker.toml:/app/config/config.toml:ro
    environment:
      - PRIVATE_KEY=${PRIVATE_KEY:-983760a4ebf75b2ac3a93531168a0f225d01e5dc6e3568adbd46233ba1fb4fa4}
    ports:
      - "${EXT_PROXY_INTERNAL_BIND:-127.0.0.1:6673}:6663"
      - "${EXT_PROXY_EXTERNAL_BIND:-127.0.0.1:6674}:6664"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:6663/healthy"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  extension-tee:
    build:
      context: ../..
      dockerfile: extensions/extension-scaffold/Dockerfile
    env_file:
      - path: ./config/extension.env
        required: false
    environment:
      - MODE=${MODE:-1}
      - INITIAL_OWNER=${INITIAL_OWNER:-0xF4E021377420Afe90c1A7D2b8968904946633a64}
      - PROXY_URL=http://ext-proxy:6663
      - CONFIG_PORT=5501
      - SIGN_PORT=7701
      - EXTENSION_PORT=7702
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      ext-proxy:
        condition: service_healthy

networks:
  default:
    name: ${COMPOSE_NETWORK:-docker_default}
    external: true
