# ext-proxy config for VM 1.
# Secrets come from environment variables — see ../.env.example.

redis_port = "redis:6379"

private_key_variable = "PROXY_PRIVATE_KEY"
initial_signing_policy_offset = 0
signing_policy_fetch_interval = "20s"

chain_id = 114

# Coston2 c-chain indexer DB — shared external instance.
# host/password are env-var references resolved by the tee-proxy at startup.
[db]
host = "INDEXER_DB_HOST"
port = 3306
database = "indexer"
username = "indexer-reader"
password = "INDEXER_DB_PASSWORD"
log_queries = false

# Coston2 Flare system contracts.
[addresses]
flare_systems_manager = "0xA90Db6D10F856799b10ef2A77EBCbF460aC71e52"
relay = "0xa10B672D1c62e5457b17af63d4302add6A99d7dE"
voter_registry = "0x6a0AF07b7972177B176d3D422555cbc98DfDe914"

[ports]
internal = "6663"
external = "6664"

[info_timing]
cycle_internal = "10s"
cycle_queue_response_wait = "2s"

[voting]
proposal_expiration = "12s"
max_pending_request = 10000

[direct]
enable = true
api_key_variable = "DIRECT_API_KEY"
